services:
  postgres:
    image: postgres:16-alpine
    container_name: hatnet-demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hatnet_demo
      POSTGRES_USER: hatnet
      POSTGRES_PASSWORD: hatnet_dev_password
    ports:
      - "5432:5432"
    volumes:
      - hatnet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hatnet -d hatnet_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hatnet_postgres_data:
